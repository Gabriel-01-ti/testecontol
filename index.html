<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Quintals League - Admin</title><style>
    body { font-family: Arial; background:#0b0f2a; color:white; margin:0; padding-bottom: 50px; }
    header { background: linear-gradient(135deg,#0f172a,#1e3a8a); text-align:center; padding:20px 10px; border-bottom: 2px solid #3b82f6; }
    header h1 { margin:0; font-size:26px; letter-spacing:2px; background: linear-gradient(90deg,#3b82f6,#22c55e); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    header img { width:120px; margin-top:10px; border-radius:10px; }
    .container { padding:10px; max-width: 800px; margin: auto; }
    
    #admin-controls { display: none; background: #16213e; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px dashed #3b82f6; }
    input, button { width:100%; padding:14px; margin:6px 0; border-radius:10px; border:none; box-sizing: border-box; }
    button { background:#2563eb; color:white; font-weight:bold; cursor:pointer; }
    .btn-reiniciar { background: #dc2626; margin-top: 20px; }
    
    table { width:100%; border-collapse:collapse; margin-top:10px; background: #111827; }
    th, td { padding:10px 5px; border-bottom:1px solid #1f2937; text-align: center; font-size: 13px; }
    th { color:#9ca3af; background: #0f172a; }
    .top { border-left:4px solid #22c55e; }

    .jogo { display:grid; grid-template-columns: 1fr auto 1fr; align-items:center; background:#1e293b; padding:12px; margin:8px 0; border-radius:10px; border: 1px solid #334155; }
    .time { text-align:center; font-weight: bold; font-size: 13px; }
    .placar { display:flex; gap:5px; align-items:center; }
    .placar input { width:40px; height:35px; text-align:center; border-radius: 5px; border: none; background: white; color: black; font-weight: bold; margin:0; }
    .placar input:disabled { background: #64748b; color: #fff; }
     @keyframes campeaoGlow {
  0% { transform: scale(1); text-shadow: 0 0 5px #22c55e; }
  50% { transform: scale(1.1); text-shadow: 0 0 20px #22c55e; }
  100% { transform: scale(1); text-shadow: 0 0 5px #22c55e; }
}
.campeao-animado {
  animation: campeaoGlow 1s infinite;
  color: #22c55e;
  font-weight: bold;
}

</style></head><body>

<header>
    <h1>🏆 UEFA QUINTALS LEAGUE</h1>
<img src="Champions-League-com-novo-formato-comeca-hoje.-Confira-os-jogos.jpg">
</header>

<div class="container">
    <div id="admin-controls">
        <input id="novoTime" placeholder="Nome do Time">
        <button id="addBtn">Adicionar Time</button>
        <button id="btnMata" style="background:#059669">Gerar Mata-Mata</button>
        <button id="btnFinalizarSemis" style="background:#22c55e;">Finalizar Semifinais</button>
        <button id="btnReset" class="btn-reiniciar">Reiniciar Tudo</button>
    </div>

    <table id="tabela">
        <thead>
            <tr><th>Pos</th><th>Time</th><th>P</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>SG</th></tr>
        </thead>
        <tbody></tbody>
    </table>

    <h3>Jogos</h3>
    <div id="jogos"></div>

    <h3>Mata-mata</h3>
    <div id="mata"></div>
</div>
                <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyDzkYJFDP8a37YK109nBW9yk1kAdOAT6cI",
  authDomain: "appquintals.firebaseapp.com",
  databaseURL: "https://appquintals-default-rtdb.firebaseio.com",
  projectId: "appquintals",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let IsAdmin = false;
const jogosDiv = document.getElementById("jogos");
const mata = document.getElementById("mata");
const tabela = document.getElementById("tabela");
const fixId = (s) => s.replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'');

// ================= LOGIN =================
const loginHTML = `
<div id="loginBox" style="background:#16213e;padding:15px;border-radius:10px;margin-bottom:10px;">
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button id="btnLogin">Entrar</button>
</div>`;
document.querySelector(".container").insertAdjacentHTML("afterbegin", loginHTML);

const btnLogin = document.getElementById("btnLogin");
const email = document.getElementById("email");
const senha = document.getElementById("senha");
const loginBox = document.getElementById("loginBox");
const adminControls = document.getElementById("admin-controls");

btnLogin.onclick = async ()=>{
    try{
        await signInWithEmailAndPassword(auth,email.value,senha.value);
    }catch{
        alert("Erro no login");
    }
};

onAuthStateChanged(auth,(user)=>{
    if(user){
        IsAdmin = true;
        adminControls.style.display="block";
        loginBox.style.display="none";

        if(!document.getElementById("logoutBtn")){
            const b = document.createElement("button");
            b.id="logoutBtn";
            b.innerText="Sair";
            b.onclick=()=>signOut(auth);
            adminControls.appendChild(b);
        }
    }else{
        IsAdmin=false;
        adminControls.style.display="none";
        loginBox.style.display="block";
    }
});

// ================= INIT =================
async function initDB(){
    const snap = await get(ref(db,'liga'));
    if(!snap.exists()){
        await set(ref(db,'liga'),{
            times:[],
            jogos:{},
            rodadas:[],
            semis:null,
            final:null
        });
    }
}
initDB();

// ================= ADD TIME =================
novoTime.addEventListener("keypress",(e)=>{
    if(e.key==="Enter") addBtn.click();
});

addBtn.onclick = async ()=>{
    const nome = novoTime.value.trim();
    if(!nome) return;

    const snap = await get(ref(db,'liga/times'));
    let lista = snap.val()||[];

    if(!lista.includes(nome)){
        lista.push(nome);
        await update(ref(db,'liga'),{times:lista,rodadas:[]});
    }

    novoTime.value="";
};

// ================= GERAR RODADAS (IDA E VOLTA) =================
function gerarRodadas(times){
    let ida = [];
    let arr=[...times];

    if(arr.length%2!==0) arr.push("BYE");

    let n=arr.length;

    for(let r=0;r<n-1;r++){
        let rodada=[];
        for(let i=0;i<n/2;i++){
            let t1=arr[i];
            let t2=arr[n-1-i];
            if(t1!="BYE" && t2!="BYE"){
                rodada.push([t1,t2]);
            }
        }
        ida.push(rodada);
        arr.splice(1,0,arr.pop());
    }

    let volta = ida.map(r => r.map(([a,b])=>[b,a]));

    return [...ida, ...volta];
}

// ================= SALVAR GOLS =================
window.salvarGols = (id,g1,g2,t1,t2)=>{
    if(!IsAdmin) return;

    update(ref(db,'liga/jogos/'+id),{
        t1,t2,
        g1: parseInt(g1)||0,
        g2: parseInt(g2)||0
    });
};

// ================= LIGA =================
onValue(ref(db,'liga'), snap=>{
    const data = snap.val()||{};
    const times = data.times||[];
    let rodadas = data.rodadas||[];
    const jogos = data.jogos||{};

    if(rodadas.length===0 && times.length>1){
        rodadas = gerarRodadas(times);
        update(ref(db,'liga'),{rodadas});
        return;
    }

    let ranking={};

    times.forEach(t=>{
        ranking[t]={pts:0,j:0,v:0,e:0,d:0,gp:0,gc:0,sg:0};
    });

    Object.values(jogos).forEach(j=>{
        if(!j || j.g1==null || j.g2==null) return;

        ranking[j.t1].j++;
        ranking[j.t2].j++;

        ranking[j.t1].gp+=j.g1;
        ranking[j.t1].gc+=j.g2;

        ranking[j.t2].gp+=j.g2;
        ranking[j.t2].gc+=j.g1;

        if(j.g1>j.g2){
            ranking[j.t1].v++; ranking[j.t1].pts+=3;
            ranking[j.t2].d++;
        }else if(j.g2>j.g1){
            ranking[j.t2].v++; ranking[j.t2].pts+=3;
            ranking[j.t1].d++;
        }else{
            ranking[j.t1].e++; ranking[j.t2].e++;
            ranking[j.t1].pts++; ranking[j.t2].pts++;
        }
    });

    Object.keys(ranking).forEach(t=>{
        ranking[t].sg = ranking[t].gp - ranking[t].gc;
    });

    let sorted = Object.keys(ranking).map(t=>({time:t,...ranking[t]}))
    .sort((a,b)=>b.pts-a.pts||b.sg-a.sg||b.gp-a.gp);

    window.classificados = sorted;

    tabela.querySelector("tbody").innerHTML = sorted.map((t,i)=>`
    <tr class="${i<4?'top':''}">
    <td>${i+1}</td><td>${t.time}</td><td>${t.pts}</td>
    <td>${t.j}</td><td>${t.v}</td><td>${t.e}</td>
    <td>${t.d}</td><td>${t.gp}</td><td>${t.sg}</td>
    </tr>`).join('');

    let html="";
    rodadas.forEach((rodada,i)=>{
        html+=`<h4>Rodada ${i+1}</h4>`;
        rodada.forEach(([t1,t2])=>{
            const id=`m_${fixId(t1)}_${fixId(t2)}`;
            const p=jogos[id]||{};
            html+=`
            <div class="jogo">
            <div class="time">${t1}</div>
            <div class="placar">
            <input type="number" ${!IsAdmin?'disabled':''}
            value="${p.g1??''}"
            onblur="salvarGols('${id}',this.value,this.nextElementSibling.nextElementSibling.value,'${t1}','${t2}')">

            <span>x</span>

            <input type="number" ${!IsAdmin?'disabled':''}
            value="${p.g2??''}"
            onblur="salvarGols('${id}',this.previousElementSibling.previousElementSibling.value,this.value,'${t1}','${t2}')">
            </div>
            <div class="time">${t2}</div>
            </div>`;
        });
    });

    jogosDiv.innerHTML = html;
});

// ================= PENALTIS =================
function renderPen(lista){
    return lista.map(p=>p?'⚽':'⚪').join(' ');
}

window.addPen = async(path,val)=>{
    if(!IsAdmin) return;
    const snap = await get(ref(db,path));
    let lista=snap.val()||[];
    lista.push(val);
    await set(ref(db,path),lista);
};

// ================= SEMIS IDA E VOLTA =================
btnMata.onclick = async ()=>{
    const c = window.classificados;
    if(!c || c.length<4) return alert("Precisa 4");

    await set(ref(db,'liga/semis'),{
        semi1:{t1:c[0].time,t2:c[3].time,jogos:[{g1:null,g2:null},{g1:null,g2:null}],pen:[]},
        semi2:{t1:c[1].time,t2:c[2].time,jogos:[{g1:null,g2:null},{g1:null,g2:null}],pen:[]}
    });
};

window.salvarSemi = async (id,index,g1,g2)=>{
    if(!IsAdmin) return;
    await update(ref(db,'liga/semis/'+id+'/jogos/'+index),{
        g1: parseInt(g1)||0,
        g2: parseInt(g2)||0
    });
};

onValue(ref(db,'liga/semis'),snap=>{
    const s=snap.val();
    if(!s) return;

    let html="";
    Object.entries(s).forEach(([id,j])=>{
        html+=`<div><h3>${j.t1} x ${j.t2}</h3>`;

        j.jogos.forEach((p,i)=>{
            html+=`
            <div class="placar">
            <input type="number" ${!IsAdmin?'disabled':''}
            value="${p.g1??''}"
            onblur="salvarSemi('${id}',${i},this.value,this.nextElementSibling.nextElementSibling.value)">

            <span>x</span>

            <input type="number" ${!IsAdmin?'disabled':''}
            value="${p.g2??''}"
            onblur="salvarSemi('${id}',${i},this.previousElementSibling.previousElementSibling.value,this.value)">
            </div>`;
        });

        html+=`<div>${renderPen(j.pen||[])}</div>

        ${IsAdmin?`
        <button onclick="addPen('liga/semis/${id}/pen',true)">⚽</button>
        <button onclick="addPen('liga/semis/${id}/pen',false)">❌</button>
        `:''}
        </div>`;
    });

    mata.innerHTML = html;
});

// ================= FINAL =================
btnFinalizarSemis.onclick = async ()=>{
    const s=(await get(ref(db,'liga/semis'))).val();
    if(!s) return;

    function vencedor(j){
        let t1=0,t2=0;
        j.jogos.forEach(p=>{
            t1+=p.g1||0;
            t2+=p.g2||0;
        });
        if(t1>t2) return j.t1;
        if(t2>t1) return j.t2;
        return null;
    }

    const v1 = vencedor(s.semi1);
    const v2 = vencedor(s.semi2);

    if(!v1 || !v2){
        return alert("Empate! Decide nos pênaltis!");
    }

    await set(ref(db,'liga/final'),{t1:v1,t2:v2,g1:null,g2:null,pen:[]});
};

window.salvarFinal = async (g1,g2)=>{
    if(!IsAdmin) return;
    await update(ref(db,'liga/final'),{
        g1: parseInt(g1)||0,
        g2: parseInt(g2)||0
    });
};

onValue(ref(db,'liga/final'),snap=>{
    const f=snap.val();
    if(!f) return;

    mata.innerHTML+=`
    <h2>FINAL</h2>

    <div class="placar">
    <input type="number" ${!IsAdmin?'disabled':''}
    value="${f.g1??''}"
    onblur="salvarFinal(this.value,this.nextElementSibling.nextElementSibling.value)">

    <span>x</span>

    <input type="number" ${!IsAdmin?'disabled':''}
    value="${f.g2??''}"
    onblur="salvarFinal(this.previousElementSibling.previousElementSibling.value,this.value)">
    </div>

    <div>${renderPen(f.pen||[])}</div>

    ${IsAdmin?`
    <button onclick="addPen('liga/final/pen',true)">⚽</button>
    <button onclick="addPen('liga/final/pen',false)">❌</button>
    `:''}
    `;
});

// ================= RESET =================
btnReset.onclick = async ()=>{
    if(confirm("Resetar tudo?")){
        await set(ref(db,'liga'),{
            times:[],
            jogos:{},
            rodadas:[],
            semis:null,
            final:null
        });
        location.reload();
    }
};
    </script>
</body>
</html>

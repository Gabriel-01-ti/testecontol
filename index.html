<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Quintals League - Admin</title><style>
    body { font-family: Arial; background:#0b0f2a; color:white; margin:0; padding-bottom: 50px; }
    header { background: linear-gradient(135deg,#0f172a,#1e3a8a); text-align:center; padding:20px 10px; border-bottom: 2px solid #3b82f6; }
    header h1 { margin:0; font-size:26px; letter-spacing:2px; background: linear-gradient(90deg,#3b82f6,#22c55e); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    header img { width:120px; margin-top:10px; border-radius:10px; }
    .container { padding:10px; max-width: 800px; margin: auto; }
    
    #admin-controls { display: none; background: #16213e; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px dashed #3b82f6; }
    input, button { width:100%; padding:14px; margin:6px 0; border-radius:10px; border:none; box-sizing: border-box; }
    button { background:#2563eb; color:white; font-weight:bold; cursor:pointer; }
    .btn-reiniciar { background: #dc2626; margin-top: 20px; }
    
    table { width:100%; border-collapse:collapse; margin-top:10px; background: #111827; }
    th, td { padding:10px 5px; border-bottom:1px solid #1f2937; text-align: center; font-size: 13px; }
    th { color:#9ca3af; background: #0f172a; }
    .top { border-left:4px solid #22c55e; }

    .jogo { display:grid; grid-template-columns: 1fr auto 1fr; align-items:center; background:#1e293b; padding:12px; margin:8px 0; border-radius:10px; border: 1px solid #334155; }
    .time { text-align:center; font-weight: bold; font-size: 13px; }
    .placar { display:flex; gap:5px; align-items:center; }
    .placar input { width:40px; height:35px; text-align:center; border-radius: 5px; border: none; background: white; color: black; font-weight: bold; margin:0; }
    .placar input:disabled { background: #64748b; color: #fff; }
     @keyframes campeaoGlow {
  0% { transform: scale(1); text-shadow: 0 0 5px #22c55e; }
  50% { transform: scale(1.1); text-shadow: 0 0 20px #22c55e; }
  100% { transform: scale(1); text-shadow: 0 0 5px #22c55e; }
}
.campeao-animado {
  animation: campeaoGlow 1s infinite;
  color: #22c55e;
  font-weight: bold;
}

</style></head><body>

<header>
    <h1>🏆 UEFA QUINTALS LEAGUE</h1>
    <img src="Champions-League-com-novo-formato-comeca-hoje.-Confira-os-jogos.jpg">
</header>

<div class="container">
    <div id="admin-controls">
        <input id="novoTime" placeholder="Nome do Time">
        <button id="addBtn">Adicionar Time</button>
        <button id="btnMata" style="background:#059669">Gerar Mata-Mata</button>
        <button id="btnFinalizarSemis" style="background:#22c55e;">Finalizar Semifinais</button>
        <button id="btnReset" class="btn-reiniciar">Reiniciar Tudo</button>
    </div>

    <table id="tabela">
        <thead>
            <tr><th>Pos</th><th>Time</th><th>P</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>SG</th></tr>
        </thead>
        <tbody></tbody>
    </table>

    <h3>Jogos</h3>
    <div id="jogos"></div>

    <h3>Mata-mata</h3>
    <div id="mata"></div>
</div>

<div style="text-align: center; margin-top: 40px; opacity: 0.1;">
    <span id="lock" style="cursor: pointer; font-size: 24px;">🔒</span>
</div>

        <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

            
const firebaseConfig = {
  apiKey: "AIzaSyDzkYJFDP8a37YK109nBW9yk1kAdOAT6cI",
  authDomain: "appquintals.firebaseapp.com",
  databaseURL: "https://appquintals-default-rtdb.firebaseio.com",
  projectId: "appquintals",
  storageBucket: "appquintals.firebasestorage.app",
  messagingSenderId: "400340047471",
  appId: "1:400340047471:web:2b53d510d0411c1052df9a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

// 🔐 CRIA LOGIN SIMPLES NA TELA
const loginHTML = `
<div id="loginBox" style="background:#16213e; padding:15px; border-radius:10px; margin-bottom:10px;">
    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">
    <button id="btnLogin">Entrar</button>
</div>
`;

document.querySelector(".container").insertAdjacentHTML("afterbegin", loginHTML);

// 🔥 LOGIN
document.getElementById("btnLogin").onclick = async () => {
    const email = document.getElementById("email").value;
    const senha = document.getElementById("senha").value;

    try {
        await signInWithEmailAndPassword(auth, email, senha);
    } catch (e) {
        alert("Erro no login");
    }
};

// 🔥 CONTROLE DE ADMIN
onAuthStateChanged(auth, (user) => {
    if(user){
        document.getElementById("admin-controls").style.display = "block";
        document.getElementById("loginBox").style.display = "none";

        // botão logout
        if(!document.getElementById("logoutBtn")){
            const btn = document.createElement("button");
            btn.innerText = "Sair";
            btn.style.background = "#dc2626";
            btn.onclick = () => signOut(auth);
            document.getElementById("admin-controls").appendChild(btn);
        }

    } else {
        document.getElementById("admin-controls").style.display = "none";
        document.getElementById("loginBox").style.display = "block";
    }
});

// 🔥 INICIALIZA BANCO
async function initDB() {
    const snap = await get(ref(db, 'liga'));
    if (!snap.exists()) {
        await set(ref(db, 'liga'), {
            times: [],
            jogos: {},
            mataHTML: ""
        });
    }
}
initDB();

const fixId = (s) => s.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_]/g, '');

// ✅ ADICIONAR TIME
document.getElementById('addBtn').onclick = async () => {
    const nome = document.getElementById("novoTime").value.trim();
    if(!nome) return;

    const snap = await get(ref(db, 'liga/times'));
    let lista = snap.val() ?? [];

    if(!lista.includes(nome)) {
        lista.push(nome);
        await set(ref(db, 'liga/times'), lista);
    }

    document.getElementById("novoTime").value = "";
};

// ✅ SALVAR PLACAR
window.salvarGols = (id, g1, g2, t1, t2) => {
    update(ref(db, `liga/jogos/${id}`), {
        t1,
        t2,
        g1: parseInt(g1) || 0,
        g2: parseInt(g2) || 0
    });
};

// ✅ RESET
document.getElementById('btnReset').onclick = () => {
    if(confirm("Apagar tudo?")) {
        remove(ref(db, 'liga')).then(() => location.reload());
    }
};

// 🔥 TEMPO REAL
onValue(ref(db, 'liga'), (snapshot) => {
    const data = snapshot.val() ?? {};
    const times = data.times ?? [];
    const jogos = data.jogos ?? {};

    let ranking = {};
    times.forEach(t => {
        ranking[t] = {pts:0, j:0, v:0, e:0, d:0, gp:0, gc:0};
    });

    Object.values(jogos).forEach(j => {
        if(!j || !ranking[j.t1] || !ranking[j.t2]) return;

        ranking[j.t1].j++;
        ranking[j.t2].j++;

        ranking[j.t1].gp += j.g1;
        ranking[j.t1].gc += j.g2;

        ranking[j.t2].gp += j.g2;
        ranking[j.t2].gc += j.g1;

        if(j.g1 > j.g2) {
            ranking[j.t1].pts += 3;
            ranking[j.t1].v++;
            ranking[j.t2].d++;
        } else if(j.g2 > j.g1) {
            ranking[j.t2].pts += 3;
            ranking[j.t2].v++;
            ranking[j.t1].d++;
        } else {
            ranking[j.t1].pts++;
            ranking[j.t2].pts++;
            ranking[j.t1].e++;
            ranking[j.t2].e++;
        }
    });

    let sorted = Object.keys(ranking).map(t => ({
        time: t,
        ...ranking[t],
        sg: ranking[t].gp - ranking[t].gc
    }));

    sorted.sort((a,b) => b.pts - a.pts || b.sg - a.sg);
    window.classificados = sorted;

    document.querySelector("#tabela tbody").innerHTML = sorted.map((t,i) => `
        <tr class="${i<4?'top':''}">
            <td>${i+1}º</td>
            <td>${t.time}</td>
            <td>${t.pts}</td>
            <td>${t.j}</td>
            <td>${t.v}</td>
            <td>${t.e}</td>
            <td>${t.d}</td>
            <td>${t.gp}</td>
            <td>${t.sg}</td>
        </tr>
    `).join('');

    let htmlJogos = "";

    for(let i=0; i<times.length; i++) {
        for(let j=i+1; j<times.length; j++) {

            const t1 = times[i];
            const t2 = times[j];
            const id = `m_${fixId(t1)}_${fixId(t2)}`;
            const p = jogos[id] ?? {g1:'', g2:''};

            htmlJogos += `
                <div class="jogo">
                    <div class="time">${t1}</div>
                    <div class="placar">
                        <input type="number" value="${p.g1}"
                        onchange="window.salvarGols('${id}', this.value, this.nextElementSibling.nextElementSibling.value, '${t1}', '${t2}')">
                        <span>x</span>
                        <input type="number" value="${p.g2}"
                        onchange="window.salvarGols('${id}', this.previousElementSibling.previousElementSibling.value, this.value, '${t1}', '${t2}')">
                    </div>
                    <div class="time">${t2}</div>
                </div>
            `;
        }
    }

    document.getElementById("jogos").innerHTML = htmlJogos;
    document.getElementById("mata").innerHTML = data.mataHTML ?? "";
});

// ✅ MATA
document.getElementById('btnMata').onclick = () => {
    if(!window.classificados || window.classificados.length < 4) {
        return alert("Mínimo 4 times");
    }

    const c = window.classificados;

    const html = `
        <div style="background:#16213e; padding:10px; border-radius:10px;">
            <p>Semi 1: ${c[0].time} x ${c[3].time}</p>
            <p>Semi 2: ${c[1].time} x ${c[2].time}</p>
        </div>
    `;

    set(ref(db, 'liga/mataHTML'), html);
};
            // =======================
// 🔥 GERAR SEMIFINAIS
// =======================
document.getElementById('btnMata').onclick = async () => {
  if(!window.classificados || window.classificados.length < 4){
    return alert("Precisa de 4 times");
  }

  const c = window.classificados;

  await set(ref(db, 'liga/semis'), {
    semi1: { t1:c[0].time, t2:c[3].time, jogos:{ida:{},volta:{}}, penaltis:[], vencedor:null },
    semi2: { t1:c[1].time, t2:c[2].time, jogos:{ida:{},volta:{}}, penaltis:[], vencedor:null }
  });

  alert("Semifinais criadas!");
};


// =======================
// ⚽ SALVAR GOLS SEMI
// =======================
window.salvarSemi = (id,tipo,g1,g2)=>{
  update(ref(db,`liga/semis/${id}/jogos/${tipo}`),{
    g1: parseInt(g1)||0,
    g2: parseInt(g2)||0
  });
};


// =======================
// 🥅 PÊNALTIS SEMI (MORTE SÚBITA)
// =======================
window.addPenalti = async (id, t1ok, t2ok)=>{
  const snap = await get(ref(db,`liga/semis/${id}`));
  let data = snap.val();

  let lista = data.penaltis || [];
  lista.push({t1:t1ok, t2:t2ok});

  let gols1 = lista.filter(p=>p.t1).length;
  let gols2 = lista.filter(p=>p.t2).length;

  let vencedor = null;

  // após 3 cobranças → qualquer diferença decide
  if(lista.length >= 3){
    if(gols1 !== gols2){
      vencedor = gols1 > gols2 ? "t1" : "t2";
    }
  }

  await update(ref(db,`liga/semis/${id}`),{
    penaltis: lista,
    vencedor
  });
};


// =======================
// 🎯 RENDER SEMIS
// =======================
onValue(ref(db,'liga/semis'),snap=>{
  const semis = snap.val();
  if(!semis) return;

  let html="";

  Object.entries(semis).forEach(([id,s])=>{
    let ida=s.jogos?.ida||{};
    let volta=s.jogos?.volta||{};

    let total1=(ida.g1||0)+(volta.g2||0);
    let total2=(ida.g2||0)+(volta.g1||0);

    let vencedor=null;

    if(total1>total2) vencedor=s.t1;
    else if(total2>total1) vencedor=s.t2;
    else if(s.vencedor) vencedor = s.vencedor==="t1"?s.t1:s.t2;

    html+=`
    <div style="background:#16213e; padding:10px; border-radius:10px; margin:10px 0;">
      <h4>${s.t1} x ${s.t2}</h4>

      <p>Ida</p>
      <input type="number" value="${ida.g1||''}" onchange="salvarSemi('${id}','ida',this.value,this.nextElementSibling.value)">
      x
      <input type="number" value="${ida.g2||''}" onchange="salvarSemi('${id}','ida',this.previousElementSibling.value,this.value)">

      <p>Volta</p>
      <input type="number" value="${volta.g1||''}" onchange="salvarSemi('${id}','volta',this.value,this.nextElementSibling.value)">
      x
      <input type="number" value="${volta.g2||''}" onchange="salvarSemi('${id}','volta',this.previousElementSibling.value,this.value)">

      <p><b>Agregado: ${total1} x ${total2}</b></p>

      ${
        total1===total2 && !s.vencedor
        ? `
        <p>Pênaltis</p>
        <button onclick="addPenalti('${id}',true,false)">${s.t1} ⚽</button>
        <button onclick="addPenalti('${id}',false,true)">${s.t2} ⚽</button>
        <button onclick="addPenalti('${id}',false,false)">Ambos erram</button>
        `
        : ""
      }

      ${vencedor?`<h3>Vencedor: ${vencedor}</h3>`:""}
    </div>
    `;
  });

  document.getElementById("mata").innerHTML=html;
});


// =======================
// 🔒 FINALIZAR SEMIS
// =======================
document.getElementById('btnFinalizarSemis').onclick = async ()=>{
  const semis = (await get(ref(db,'liga/semis'))).val();

  if(!semis?.semi1?.vencedor || !semis?.semi2?.vencedor){
    return alert("Finalize as semis!");
  }

  const t1 = semis.semi1.vencedor==="t1"?semis.semi1.t1:semis.semi1.t2;
  const t2 = semis.semi2.vencedor==="t1"?semis.semi2.t1:semis.semi2.t2;

  await set(ref(db,'liga/final'),{
    t1,t2,
    g1:null,g2:null,
    penaltis:[],
    campeao:null
  });

  alert("Final criada!");
};


// =======================
// 🏆 FINAL (JOGO ÚNICO)
// =======================
window.salvarFinal=(g1,g2)=>{
  update(ref(db,'liga/final'),{
    g1:parseInt(g1)||0,
    g2:parseInt(g2)||0
  });
};


// =======================
// 🥅 PÊNALTIS FINAL
// =======================
window.addPenFinal=async (t1ok,t2ok)=>{
  const snap=await get(ref(db,'liga/final'));
  let f=snap.val();

  let lista=f.penaltis||[];
  lista.push({t1:t1ok,t2:t2ok});

  let g1=lista.filter(p=>p.t1).length;
  let g2=lista.filter(p=>p.t2).length;

  let campeao=null;

  if(lista.length>=3 && g1!==g2){
    campeao=g1>g2?"t1":"t2";
  }

  await update(ref(db,'liga/final'),{
    penaltis:lista,
    campeao
  });
};


// =======================
// 🎉 RENDER FINAL
// =======================
onValue(ref(db,'liga/final'),snap=>{
  const f=snap.val();
  if(!f) return;

  let campeao=null;

  if(f.g1>f.g2) campeao=f.t1;
  else if(f.g2>f.g1) campeao=f.t2;
  else if(f.campeao) campeao = f.campeao==="t1"?f.t1:f.t2;

  let html=`
  <div style="background:#0f172a; padding:15px; border-radius:10px; margin-top:20px;">
    <h2 style="text-align:center;">FINAL</h2>

    <div class="jogo">
      <div class="time">${f.t1}</div>
      <div class="placar">
        <input type="number" value="${f.g1||''}" onchange="salvarFinal(this.value,this.nextElementSibling.nextElementSibling.value)">
        <span>x</span>
        <input type="number" value="${f.g2||''}" onchange="salvarFinal(this.previousElementSibling.previousElementSibling.value,this.value)">
      </div>
      <div class="time">${f.t2}</div>
    </div>
  `;

  if(f.g1===f.g2 && f.g1!=null && !f.campeao){
    html+=`
    <p style="text-align:center;">Pênaltis</p>
    <div style="text-align:center;">
      <button onclick="addPenFinal(true,false)">${f.t1} ⚽</button>
      <button onclick="addPenFinal(false,true)">${f.t2} ⚽</button>
      <button onclick="addPenFinal(false,false)">Ambos erram</button>
    </div>
    `;
  }

  if(campeao){
    html+=`
    <div style="text-align:center; margin-top:20px;">
      <h1 class="campeao-animado">🏆 ${campeao}</h1>
      <p style="opacity:0.7;">CAMPEÃO DA QUINTALS LEAGUE</p>
    </div>
    `;
  }

  html+=`</div>`;

  document.getElementById("mata").innerHTML += html;
});
            
</script>
</body></html>

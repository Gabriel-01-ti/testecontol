<!DOCTYPE html><html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle Financeiro</title>  <style>
    body { margin:0; font-family: Arial; background:#f5f6fa; }
    header { background:#2f3640; color:white; padding:15px; text-align:center; }
    .container { max-width:1000px; margin:auto; padding:15px; }
    .card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; box-shadow:0 2px 8px rgba(0,0,0,0.1);} 

    input, select, button { width:100%; padding:10px; margin-top:10px; border-radius:8px; border:1px solid #ccc; }
    button { background:#27ae60; color:white; border:none; font-weight:bold; cursor:pointer; }

    table { width:100%; border-collapse: collapse; margin-top:10px; }
    th, td { padding:10px; text-align:left; border-bottom:1px solid #ddd; }
    th { background:#eee; }

    .entrada { color:green; }
    .saida { color:red; }

    .saldo { font-size:18px; font-weight:bold; margin-top:10px; }
  </style></head>
<body><header>Controle Financeiro (Caixa)</header><div class="container">  <div class="card">
    <h3>Nova Movimentação</h3>
    <input type="text" id="descricao" placeholder="Descrição">
    <input type="number" id="valor" placeholder="Valor"><select id="tipo">
  <option value="entrada">Entrada</option>
  <option value="saida">Saída</option>
</select>

<input type="file" id="arquivo">
<button onclick="salvar()">Salvar</button>

  </div>  <div class="card">
    <h3>Caixa</h3>
    <div class="saldo">Saldo Atual: R$ <span id="saldo">0</span></div><table>
  <thead>
    <tr>
      <th>Data</th>
      <th>Descrição</th>
      <th>Tipo</th>
      <th>Valor</th>
      <th>Saldo após</th>
      <th>Comprovante</th>
    </tr>
  </thead>
  <tbody id="tabela"></tbody>
</table>

  </div></div><script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script><script>
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  projectId: "SEU_PROJETO",
  storageBucket: "SEU_PROJETO.appspot.com",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

async function salvar() {
  const descricao = document.getElementById("descricao").value;
  const valor = parseFloat(document.getElementById("valor").value);
  const tipo = document.getElementById("tipo").value;
  const file = document.getElementById("arquivo").files[0];

  let url = "";

  if (file) {
    const ref = storage.ref("comprovantes/" + Date.now() + "-" + file.name);
    await ref.put(file);
    url = await ref.getDownloadURL();
  }

  await db.collection("movimentacoes").add({
    descricao,
    valor,
    tipo,
    comprovante: url,
    data: new Date()
  });

  alert("Salvo!");
}

// Atualizar tabela com saldo
db.collection("movimentacoes")
  .orderBy("data", "asc")
  .onSnapshot(snapshot => {
    const tabela = document.getElementById("tabela");
    const saldoEl = document.getElementById("saldo");

    tabela.innerHTML = "";
    let saldo = 0;

    snapshot.forEach(doc => {
      const d = doc.data();

      if (d.tipo === "entrada") {
        saldo += d.valor;
      } else {
        saldo -= d.valor;
      }

      tabela.innerHTML += `
        <tr>
          <td>${new Date(d.data.seconds * 1000).toLocaleDateString()}</td>
          <td>${d.descricao}</td>
          <td class="${d.tipo}">${d.tipo}</td>
          <td>R$ ${d.valor}</td>
          <td>R$ ${saldo.toFixed(2)}</td>
          <td>${d.comprovante ? `<a href="${d.comprovante}" target="_blank">Ver</a>` : "-"}</td>
        </tr>
      `;
    });

    saldoEl.innerText = saldo.toFixed(2);
  });
</script></body>
</html>

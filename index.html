<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Quintals League - Admin</title><style>
    body { font-family: Arial; background:#0b0f2a; color:white; margin:0; padding-bottom: 50px; }
    header { background: linear-gradient(135deg,#0f172a,#1e3a8a); text-align:center; padding:20px 10px; border-bottom: 2px solid #3b82f6; }
    header h1 { margin:0; font-size:26px; letter-spacing:2px; background: linear-gradient(90deg,#3b82f6,#22c55e); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    header img { width:120px; margin-top:10px; border-radius:10px; }
    .container { padding:10px; max-width: 800px; margin: auto; }
    
    #admin-controls { display: none; background: #16213e; padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px dashed #3b82f6; }
    input, button { width:100%; padding:14px; margin:6px 0; border-radius:10px; border:none; box-sizing: border-box; }
    button { background:#2563eb; color:white; font-weight:bold; cursor:pointer; }
    .btn-reiniciar { background: #dc2626; margin-top: 20px; }
    
    table { width:100%; border-collapse:collapse; margin-top:10px; background: #111827; }
    th, td { padding:10px 5px; border-bottom:1px solid #1f2937; text-align: center; font-size: 13px; }
    th { color:#9ca3af; background: #0f172a; }
    .top { border-left:4px solid #22c55e; }

    .jogo { display:grid; grid-template-columns: 1fr auto 1fr; align-items:center; background:#1e293b; padding:12px; margin:8px 0; border-radius:10px; border: 1px solid #334155; }
    .time { text-align:center; font-weight: bold; font-size: 13px; }
    .placar { display:flex; gap:5px; align-items:center; }
    .placar input { width:40px; height:35px; text-align:center; border-radius: 5px; border: none; background: white; color: black; font-weight: bold; margin:0; }
    .placar input:disabled { background: #64748b; color: #fff; }
     @keyframes campeaoGlow {
  0% { transform: scale(1); text-shadow: 0 0 5px #22c55e; }
  50% { transform: scale(1.1); text-shadow: 0 0 20px #22c55e; }
  100% { transform: scale(1); text-shadow: 0 0 5px #22c55e; }
}
.campeao-animado {
  animation: campeaoGlow 1s infinite;
  color: #22c55e;
  font-weight: bold;
}

</style></head><body>

<header>
    <h1>🏆 UEFA QUINTALS LEAGUE</h1>
    <img src="Champions-League-com-novo-formato-comeca-hoje.-Confira-os-jogos.jpg">
</header>

<div class="container">
    <div id="admin-controls">
        <input id="novoTime" placeholder="Nome do Time">
        <button id="addBtn">Adicionar Time</button>
        <button id="btnMata" style="background:#059669">Gerar Mata-Mata</button>
        <button id="btnFinalizarSemis" style="background:#22c55e;">Finalizar Semifinais</button>
        <button id="btnReset" class="btn-reiniciar">Reiniciar Tudo</button>
    </div>

    <table id="tabela">
        <thead>
            <tr><th>Pos</th><th>Time</th><th>P</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>SG</th></tr>
        </thead>
        <tbody></tbody>
    </table>

    <h3>Jogos</h3>
    <div id="jogos"></div>

    <h3>Mata-mata</h3>
    <div id="mata"></div>
</div>

    <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "appquintals.firebaseapp.com",
  databaseURL: "https://appquintals-default-rtdb.firebaseio.com",
  projectId: "appquintals",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

let isAdmin = false;

// ================= LOGIN =================
document.getElementById("btnLogin").onclick = async ()=>{
    try{
        await signInWithEmailAndPassword(auth,
            document.getElementById("email").value,
            document.getElementById("senha").value
        );
    }catch{
        alert("Erro login");
    }
};

onAuthStateChanged(auth,user=>{
    isAdmin = !!user;
    document.getElementById("admin-controls").style.display = isAdmin ? "block":"none";
});

// ================= INIT =================
async function init(){
    const snap = await get(ref(db,"liga"));
    if(!snap.exists()){
        await set(ref(db,"liga"),{
            times:[],
            jogos:{},
            semis:null,
            final:null
        });
    }
}
init();

// ================= ADD TIME =================
document.getElementById("addBtn").onclick = async ()=>{
    if(!isAdmin) return;

    const input = document.getElementById("novoTime");
    const nome = input.value.trim();
    if(!nome) return;

    const snap = await get(ref(db,"liga/times"));
    let lista = snap.val() || [];

    if(!lista.includes(nome)){
        lista.push(nome);
        await set(ref(db,"liga/times"),lista);
    }

    input.value="";
};

document.getElementById("novoTime").addEventListener("keypress",e=>{
    if(e.key==="Enter") document.getElementById("addBtn").click();
});

// ================= GERAR RODADAS =================
function gerarRodadas(times){
    let lista=[...times];
    if(lista.length%2!==0) lista.push("BYE");

    let rodadas=[];
    let n=lista.length;

    for(let r=0;r<n-1;r++){
        let rodada=[];
        for(let i=0;i<n/2;i++){
            let t1=lista[i];
            let t2=lista[n-1-i];
            if(t1!=="BYE" && t2!=="BYE"){
                rodada.push([t1,t2]);
            }
        }
        rodadas.push(rodada);
        lista.splice(1,0,lista.pop());
    }
    return rodadas;
}

// ================= GERAR LIGA UMA VEZ =================
async function gerarLiga(times){
    const rodadas = gerarRodadas(times);
    let jogos={};

    rodadas.forEach((rodada,r)=>{
        rodada.forEach((jogo,i)=>{
            jogos[`r${r}_j${i}`]={
                t1:jogo[0],
                t2:jogo[1],
                g1:"",
                g2:""
            };
        });
    });

    await update(ref(db,"liga"),{jogos});
}

// ================= SALVAR GOLS =================
window.salvarGols=(id,g1,g2)=>{
    if(!isAdmin) return;

    update(ref(db,`liga/jogos/${id}`),{
        g1: g1===""?"":parseInt(g1),
        g2: g2===""?"":parseInt(g2)
    });
};

// ================= LIGA =================
onValue(ref(db,"liga"),snap=>{
    const data=snap.val()||{};
    const times=data.times||[];
    const jogos=data.jogos||{};

    if(Object.keys(jogos).length===0 && times.length>=2){
        gerarLiga(times);
        return;
    }

    let tabela={};
    times.forEach(t=>tabela[t]={pts:0,gp:0,gc:0,j:0});

    Object.values(jogos).forEach(j=>{
        if(j.g1==="" || j.g2==="") return;

        tabela[j.t1].j++;
        tabela[j.t2].j++;

        tabela[j.t1].gp+=j.g1;
        tabela[j.t2].gp+=j.g2;

        tabela[j.t1].gc+=j.g2;
        tabela[j.t2].gc+=j.g1;

        if(j.g1>j.g2) tabela[j.t1].pts+=3;
        else if(j.g2>j.g1) tabela[j.t2].pts+=3;
        else{
            tabela[j.t1].pts++;
            tabela[j.t2].pts++;
        }
    });

    let sorted=Object.keys(tabela).map(t=>({
        time:t,...tabela[t],sg:tabela[t].gp-tabela[t].gc
    })).sort((a,b)=>b.pts-a.pts||b.sg-a.sg);

    window.classificados=sorted;

    document.querySelector("#tabela tbody").innerHTML =
    sorted.map((t,i)=>`
    <tr class="${i<4?'top':''}">
        <td>${i+1}</td>
        <td>${t.time}</td>
        <td>${t.pts}</td>
        <td>${t.j}</td>
        <td>${t.gp}</td>
        <td>${t.sg}</td>
    </tr>
    `).join("");

    let rodadasHTML={};

    Object.entries(jogos).forEach(([id,j])=>{
        let r=id.split("_")[0];
        if(!rodadasHTML[r]) rodadasHTML[r]=[];

        rodadasHTML[r].push(`
        <div class="jogo">
            <div class="time">${j.t1}</div>
            <div class="placar">
                <input type="number"
                value="${j.g1}"
                ${!isAdmin?"disabled":""}
                onchange="salvarGols('${id}',this.value,this.nextElementSibling.nextElementSibling.value)">
                <span>x</span>
                <input type="number"
                value="${j.g2}"
                ${!isAdmin?"disabled":""}
                onchange="salvarGols('${id}',this.previousElementSibling.previousElementSibling.value,this.value)">
            </div>
            <div class="time">${j.t2}</div>
        </div>
        `);
    });

    let html="";
    Object.keys(rodadasHTML).forEach(r=>{
        html+=`<h4>Rodada ${r.replace("r","")}</h4>`;
        html+=rodadasHTML[r].join("");
    });

    document.getElementById("jogos").innerHTML=html;
});

// ================= GERAR SEMIS =================
document.getElementById("btnMata").onclick = async ()=>{
    if(!isAdmin) return;

    const c=window.classificados;
    if(!c || c.length<4) return alert("Precisa 4 times");

    await set(ref(db,"liga/semis"),{
        s1:{t1:c[0].time,t2:c[3].time,pen:[],v:null},
        s2:{t1:c[1].time,t2:c[2].time,pen:[],v:null}
    });
};

// ================= PENALTIS =================
window.penSemi=async(id,team)=>{
    if(!isAdmin) return;

    const snap=await get(ref(db,`liga/semis/${id}`));
    let s=snap.val();

    let lista=s.pen||[];
    lista.push(team);

    let g1=lista.filter(x=>x==="t1").length;
    let g2=lista.filter(x=>x==="t2").length;

    let v=null;
    if(lista.length>=5 && g1!==g2){
        v=g1>g2?"t1":"t2";
    }

    await update(ref(db,`liga/semis/${id}`),{pen:lista,v});
};

// ================= MOSTRAR SEMIS =================
onValue(ref(db,"liga/semis"),snap=>{
    const semis=snap.val();
    if(!semis) return;

    let html="";

    Object.entries(semis).forEach(([id,s])=>{
        let bolas=(s.pen||[]).map(p=>`<span>${p==="t1"?"⚽":"❌"}</span>`).join("");

        html+=`
        <div style="margin:10px 0">
            <h3>${s.t1} x ${s.t2}</h3>

            ${isAdmin?`
            <button onclick="penSemi('${id}','t1')">⚽ ${s.t1}</button>
            <button onclick="penSemi('${id}','t2')">⚽ ${s.t2}</button>
            `:""}

            <div>${bolas}</div>

            ${s.v?`<h2>Vencedor: ${s.v==="t1"?s.t1:s.t2}</h2>`:""}
        </div>
        `;
    });

    document.getElementById("mata").innerHTML=html;
});

// ================= RESET =================
document.getElementById("btnReset").onclick = async ()=>{
    if(!isAdmin) return;

    if(confirm("Resetar tudo?")){
        await set(ref(db,"liga"),{
            times:[],
            jogos:{},
            semis:null,
            final:null
        });
        location.reload();
    }
};
    </script>

</body>
</html>
